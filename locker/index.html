<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <!-- عرض صفحة متجاوبة على الهواتف -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Baseball 9</title>

  <style>
    /* إعادة ضبط الهوامش والأبعاد */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    /* حاوية مرنة تُغطي الشاشة بالكامل */
    .wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* لوحة تحكم سريعة للمستخدم (اختياري) */
    .tip {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,.6);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <iframe
      src="https://d2jgih9urxpa47.cloudfront.net/public/locker.php?it=4458198&key=3915d"
      allowfullscreen
      title="Baseball 9"
    ></iframe>
    <span class="tip"> </span>
  </div>

  <!-- سكربت بسيط لإعادة حساب الارتفاع عند تغيير الاتجاه -->
  <script>
    function resizeIframe() {
      // لا حاجة لعمل حسابات معقدة، لأن CSS يتكفل بالتحجيم
      window.dispatchEvent(new Event('resize'));
    }
    window.addEventListener('orientationchange', resizeIframe);
    window.addEventListener('resize', resizeIframe);
  </script>
</body>
</html>
